<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <script>
        (function () {
            const stored = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (stored === 'dark' || (!stored && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-gray-50 dark:bg-gray-900">
    <a href="#mainContent" class="skip-link no-print">Skip to main content</a>
    <header class="bg-white dark:bg-gray-800 shadow-sm no-print">
        <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Admin Settings</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400">Manage your application settings</p>
            </div>
            <button id="themeToggle" type="button"
                class="inline-flex items-center gap-2 px-3 py-2 rounded-md border border-gray-300 dark:border-gray-600 text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                aria-label="Toggle dark mode" aria-pressed="false">
                <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
                <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <span id="themeLabel">Dark</span>
            </button>
        </div>
    </header>

    <main id="mainContent" tabindex="-1" class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 no-print">
                <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6 form-section" role="region" aria-labelledby="formHeading">
                    <h2 id="formHeading" class="text-lg font-medium text-gray-900 dark:text-white mb-4">Settings Form</h2>
                    <form id="settingsForm" novalidate aria-labelledby="formHeading" tabindex="-1">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-200" for="adminName">
                                Admin Name <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="adminName" name="adminName" maxlength="50"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                placeholder="Enter your name" required aria-required="true" aria-describedby="adminNameError" aria-invalid="false">
                            <span class="error" id="adminNameError"></span>
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-200" for="adminEmail">
                                Admin Email <span class="text-red-500">*</span>
                            </label>
                            <input type="email" id="adminEmail" name="adminEmail" maxlength="100"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                placeholder="Enter your email" required aria-required="true" aria-describedby="adminEmailError" aria-invalid="false">
                            <span class="error" id="adminEmailError"></span>
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-200" for="phoneNumber">
                                Phone Number
                            </label>
                            <input type="tel" id="phoneNumber" name="phoneNumber" maxlength="20"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                placeholder="Enter your phone number" aria-describedby="phoneNumberError" aria-invalid="false">
                            <span class="error" id="phoneNumberError"></span>
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-200" for="companyName">
                                Company Name <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="companyName" name="companyName" maxlength="100"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                placeholder="Enter your company name" required aria-required="true" aria-describedby="companyNameError" aria-invalid="false">
                            <span class="error" id="companyNameError"></span>
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-200" for="companyAddress">
                                Company Address <span class="text-red-500">*</span>
                            </label>
                            <textarea id="companyAddress" name="companyAddress" rows="3" maxlength="500"
                                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                                placeholder="Enter your company address" required aria-required="true" aria-describedby="companyAddressError" aria-invalid="false"></textarea>
                            <span class="error" id="companyAddressError"></span>
                        </div>

                        <button type="submit" id="submitBtn"
                            class="w-full inline-flex justify-center items-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            <span id="submitText">Save Settings</span>
                            <span id="loadingText" class="hidden ml-2" role="status" aria-live="polite">
                                <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg"
                                    fill="none" viewBox="0 0 24 24" aria-hidden="true">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                        stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor"
                                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                    </path>
                                </svg>
                            </span>
                        </button>
                    </form>
                    <div id="formMessage" class="mt-4" role="status" aria-live="polite"></div>
                </div>
            </div>

            <div class="lg:col-span-2" id="printArea" role="region" aria-labelledby="dataHeading">
                <div class="print-only mb-4">
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Submitted Settings Data</h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Generated on: <span id="printDate"></span></p>
                </div>
                <div class="bg-white dark:bg-gray-800 shadow rounded-lg p-6 form-section">
                    <div class="flex justify-between items-center mb-4">
                        <h2 id="dataHeading" class="text-lg font-medium text-gray-900 dark:text-white no-print">Submitted Data</h2>
                        <button onclick="printData()"
                            class="inline-flex items-center px-3 py-1 border border-gray-300 dark:border-gray-600 rounded-md text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 no-print">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V8a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                            </svg>
                            Print
                        </button>
                    </div>
                    <div id="dashboardData" class="space-y-4" tabindex="-1" role="status" aria-live="polite" aria-relevant="additions text">
                        <p class="text-gray-500 dark:text-gray-400">No settings submitted yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
